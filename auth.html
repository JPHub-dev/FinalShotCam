<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Auth - FinalShoot</title>
  <link rel="stylesheet" href="auth.css">
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@400;700;800&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
  <main class="auth-page">
    <section class="auth-left">
      <header class="auth-header">
        <div class="brand">FINALSHOOT!</div>
      </header>

      <div class="auth-body">

  <!-- LOGIN -->
  <form id="loginForm" class="auth-form active" autocomplete="off">

    <h1 class="auth-title">Login.</h1>
    <p class="auth-sub">
      Welcome back! Please enter your credentials.
    </p>

    <div class="field">

      <div class="input-box">
        <i class="fa-regular fa-envelope"></i>

        <input
          type="email"
          name="email"
          placeholder="Email Address"
          required>
      </div>

    </div>

    <div class="field">

      <div class="pw-wrap">

        <div class="input-box">

          <i class="fa-solid fa-lock"></i>

          <input
            id="loginPassword"
            type="password"
            name="password"
            placeholder="Password"
            required>

        </div>

        <button
          type="button"
          class="pw-toggle"
          data-target="loginPassword">

          <i class="fa-regular fa-eye"></i>

        </button>

      </div>

    </div>

    <button class="btn primary" type="submit">
      Login
    </button>

    <div class="auth-aux">
      <span>Don't have an account?</span>

      <button
        type="button"
        class="switch-form"
        data-target="signup">

        Signup

      </button>
    </div>

  </form>



  <!-- SIGNUP -->
  <form id="signupForm" class="auth-form" autocomplete="off">

    <h1 class="auth-title">Create Account</h1>

    <p class="auth-sub">
      Create your account and join the fun.
    </p>

    <div class="field">

      <div class="input-box">

        <i class="fa-regular fa-user"></i>

        <input
          type="text"
          name="name"
          placeholder="Full Name"
          required>

      </div>

    </div>

    <div class="field">

      <div class="input-box">

        <i class="fa-regular fa-envelope"></i>

        <input
          type="email"
          name="email"
          placeholder="Email Address"
          required>

      </div>

    </div>

    <div class="field">

      <div class="pw-wrap">

        <div class="input-box">

          <i class="fa-solid fa-lock"></i>

          <input
            id="signupPassword"
            type="password"
            name="password"
            placeholder="Create Password"
            required>

        </div>

        <button
          type="button"
          class="pw-toggle"
          data-target="signupPassword">

          <i class="fa-regular fa-eye"></i>

        </button>

      </div>

    </div>

    <button class="btn primary" type="submit">
      Create Account
    </button>

    <div class="auth-aux">

      <span>Already have an account?</span>

      <button
        type="button"
        class="switch-form"
        data-target="login">

        Login

      </button>

    </div>

  </form>

</div>

    </section>

  </main>

  <script src="auth.js"></script>
</body>
</html>
