<!DOCTYPE html>
<html>
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="camera.css">
</head>

<body>
   <div class="camera-box">
        <button class="retake-button hidden">
          ✕
        </button>
        <h1>CLICK TO START!</h1>

        <div class="camera-frame">
          <video id="camera" autoplay playsinline></video>
          
          <canvas id="canvas" hidden></canvas>

           <!--COUNTDOWN-->
           <div class="countdown hidden">3</div>

            <button class="camera-button">
              <img src="assets/Group 11 (1).png" alt="Camera Icon">
            </button>
        </div>

        <!-- Camera Preview -->
        <div class="photo-preview hidden">
            <div class="photo-slot" id="slot1"></div>
            <div class="photo-slot" id="slot2"></div>
            <div class="photo-slot" id="slot3"></div>
            <div class="photo-slot" id="slot4"></div>
        </div>

        <button class="next-button hidden">
            NEXT
        </button>
    </div>

  <script src="camera.js"></script>
</body>
</html>
