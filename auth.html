<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Auth - FinalShoot</title>
  <link rel="stylesheet" href="auth.css">
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@400;700;800&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="auth-page">
    <section class="auth-left">
      <header class="auth-header">
        <div class="brand">FINALSHOOT!</div>
      </header>

      <div class="auth-body">
        <form id="loginForm" class="auth-form active" autocomplete="off">
          <h1 class="auth-title">Login.</h1>
          <p class="auth-sub">Welcome back! Please enter your credentials.</p>

          <label class="field">
            <span class="field-label">Email</span>
            <input type="email" name="email" placeholder="you@domain.com" required>
          </label>

          <label class="field">
            <span class="field-label">Password</span>
            <div class="pw-wrap">
              <input id="loginPassword" type="password" name="password" placeholder="Password" required>
              <button type="button" class="pw-toggle" data-target="loginPassword" aria-label="toggle password">👁️</button>
            </div>
          </label>

          <button class="btn primary" type="submit">Login</button>
          <div class="auth-aux">
            <span>Don't have an account?</span>
            <button type="button" class="switch-form" data-target="signup">Signup</button>
          </div>
        </form>

        <form id="signupForm" class="auth-form" autocomplete="off">
          <h1 class="auth-title">Create account</h1>
          <p class="auth-sub">Create your account and join the fun.</p>

          <label class="field">
            <span class="field-label">Full name</span>
            <input type="text" name="name" placeholder="Your name" required>
          </label>

          <label class="field">
            <span class="field-label">Email</span>
            <input type="email" name="email" placeholder="you@domain.com" required>
          </label>

          <label class="field">
            <span class="field-label">Password</span>
            <div class="pw-wrap">
              <input id="signupPassword" type="password" name="password" placeholder="Create a password" required>
              <button type="button" class="pw-toggle" data-target="signupPassword" aria-label="toggle password">👁️</button>
            </div>
          </label>

          <button class="btn primary" type="submit">Create account</button>
          <div class="auth-aux">
            <span>Already have an account?</span>
            <button type="button" class="switch-form" data-target="login">Login</button>
          </div>
        </form>
      </div>
    </section>

    <aside class="auth-right" id="authRight" data-images="assets/image1.png, assets/image2.png, assets/image3.png">
      <!-- Empty blue panel for auto-rotating background images -->
      <div class="auth-bg"></div>
    </aside>
  </main>

  <script src="auth.js"></script>
</body>
</html>
